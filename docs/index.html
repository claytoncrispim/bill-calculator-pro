<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <main class="container mt-5" data-ui="app-shell">
      <header class="text-center mb-4" data-ui="app-header">
          <h1 data-ui="app-title" id="app-title"></h1>
          <p class="lead" data-ui="app-subtitle" id="app-subtitle"></p>
      </header>

    <div class="row" data-ui="layout-grid">
        <div class="col-md-5" data-ui="form-column">
            <h2 data-ui="form-section-title">Add a New Bill</h2>
            <form id="bill-form" class="p-4 border rounded bg-light" data-ui="bill-form">
                <div class="mb-3">
                  <label for="billType" class="form-label">Bill Type</label>
                  <select class="form-select" id="billType" name="type" required>
                      <option value="" selected disabled>Select a type...</option>
                      <option value="Energy">Energy</option>
                      <option value="Broadband">Broadband</option>
                      <option value="Streaming">Streaming</option>
                      <option value="Other">Other</option>
                  </select>
              </div>
              <div id="loading-spinner" class="d-flex justify-content-center mt-5 d-none">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
              </div>
              <div class="mb-3 d-none" id="streamingName-container">
                  <label for="streamingName" class="form-label">Streaming Service Name</label>
                  <input type="text" class="form-control" id="streamingName" name="name-streaming" placeholder="e.g., Netflix, Spotify">
              </div>
              <div class="mb-3 d-none" id="otherType-container">
                    <label for="otherTypeName" class="form-label">Specify Bill Type</label>
                    <input type="text" class="form-control" id="otherTypeName" name="name-other" placeholder="e.g., Gas, Mortgage">
              </div>

              <div class="mb-3">
                  <label for="amount" class="form-label">Amount</label>
                  <div class="input-group">
                      <select class="form-select" style="max-width: 80px;" id="currency" name="currency">
                          <option>EUR</option>
                          <option>USD</option>
                          <option>BRL</option>
                      </select>
                      <input type="number" class="form-control" id="amount" name="amount" placeholder="50.00" required step="0.01">
                  </div>
              </div>

              <div class="mb-3">
                  <label for="paymentMethod" class="form-label">Payment Method</label>
                  <select class="form-select" id="paymentMethod" name="paymentMethod" required>
                      <option value="Direct Debit">Direct Debit</option>
                      <option value="Credit Card">Credit Card</option>
                      <option value="Debit Card">Debit Card</option>
                  </select>
              </div>

              <div class="mb-3">
                  <label for="status" class="form-label">Status</label>
                  <select class="form-select" id="status" name="status" required>
                      <option value="Pending">Pending</option>
                      <option value="Paid">Paid</option>
                      <option value="Unpaid">Unpaid</option>
                  </select>
              </div>
              <button type="submit" class="btn btn-primary w-100" data-ui="add-bill-btn">Add Bill</button>
            </form>
        </div>

        <div class="col-md-7" data-ui="bills-column">
            <h2 data-ui="bills-section-title">My Bills</h2>
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-2" data-ui="bills-toolbar">
              <div id="filter-buttons-container" class="btn-group flex-wrap" role="group" aria-label="Bill filters" data-ui="filter-group">
                <button type="button" class="btn btn-outline-primary active filter-btn" data-filter="All">All</button>
                <button type="button" class="btn btn-outline-primary filter-btn" data-filter="Paid">Paid</button>
                <button type="button" class="btn btn-outline-primary filter-btn" data-filter="Unpaid">Unpaid</button>
                <button type="button" class="btn btn-outline-primary filter-btn" data-filter="Pending">Pending</button>
              </div>

              <div class="d-flex align-items-center justify-content-md-end gap-2" data-ui="sort-controls">
                <label for="sort-by" class="form-label mb-0 text-nowrap" data-ui="sort-label">Sort By:</label>
                <select class="form-select form-select-sm w-100 w-md-auto" id="sort-by" data-ui="sort-select">
                  <option value="default">Default Order</option>
                  <option value="amount-high-low">Amount (High to Low)</option>
                  <option value="amount-low-high">Amount (Low to High)</option>
                  <option value="name-az">Name (A-Z)</option>
                </select>
              </div>
            </div>
            <div class="text-end mb-3" data-ui="total-panel">
                <h5 class="mb-1" data-ui="total-row">Paid: 
                    <span id="total-paid" class="badge bg-success" data-ui="total-paid">€0.00</span>
                </h5>
                <h5 class="mb-1" data-ui="total-row">Pending: 
                    <span id="total-pending" class="badge bg-warning text-dark" data-ui="total-pending">€0.00</span>
                </h5>
                <h5 class="mb-1" data-ui="total-row">Unpaid: 
                    <span id="total-unpaid" class="badge bg-danger" data-ui="total-unpaid">€0.00</span>
                </h5>
            </div>
            <div id="bills-list" data-ui="bills-list">
            </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="editBillModal" tabindex="-1" aria-labelledby="editBillModalLabel" aria-hidden="true" data-ui="edit-modal">
      <div class="modal-dialog" data-ui="edit-modal-dialog">
        <div class="modal-content" data-ui="edit-modal-content">
          <div class="modal-header" data-ui="edit-modal-header">
            <h5 class="modal-title" id="editBillModalLabel">Edit Bill</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" data-ui="edit-modal-body">
            <form id="edit-bill-form" data-ui="edit-bill-form">
              <input type="hidden" id="edit-bill-id" name="id">

              <div class="mb-3">
                <label for="edit-amount" class="form-label">Amount</label>
                <input type="number" class="form-control" id="edit-amount" name="amount" required step="0.01">
              </div>
              <div class="mb-3">
                <label for="edit-status" class="form-label">Status</label>
                <select class="form-select" id="edit-status" name="status" required>
                  <option value="Pending">Pending</option>
                  <option value="Paid">Paid</option>
                  <option value="Unpaid">Unpaid</option>
                </select>
              </div>

              <div class="modal-footer" data-ui="edit-modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./config/app-config.js"></script>
    <script type="module" src="./script.js" defer></script>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" data-ui="toast-container">
      <div id="app-notification-toast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true" data-ui="notification-toast">
        <div class="d-flex">
          <div class="toast-body" id="toast-body" data-ui="toast-body">
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>    
  </body>
</html>
